        live","url":"https://www.last.fm/tag/seen+live"}]},"bio":{"links":{"link":{"#text":"","rel":"original","href":"https://last.fm/music/Gost/+wiki"}},"published":"04
        Mar 2013, 16:48","summary":"\nAnd it came to pass, as soon as Gideon was dead,
        that the children of Israel \nturned again, and went a whoring after Baalim,
        and made Baalberith their god. \n\nDirected and commanded by another power.
        The power of darkness, which many \npeople do not believe exists. The power
        of the Devil. The power of Satan. The power of Baalberith. \n\nGosT is a synthwave
        producer from Texas who specializes in a unique blend of synthwave and horror,
        often referred as ''slasherwave'' by his fans. <a href=\"https://www.last.fm/music/Gost\">Read
        more on Last.fm</a>","content":"\nAnd it came to pass, as soon as Gideon was
        dead, that the children of Israel \nturned again, and went a whoring after
        Baalim, and made Baalberith their god. \n\nDirected and commanded by another
        power. The power of darkness, which many \npeople do not believe exists. The
        power of the Devil. The power of Satan. The power of Baalberith. \n\nGosT
        is a synthwave producer from Texas who specializes in a unique blend of synthwave
        and horror, often referred as ''slasherwave'' by his fans. Having put out
        multiple releases through his own bandcamp page, he has released music through
        record label Werkstatt Recordings. Most recently, GosT''s debut and second
        album, ''Behemoth'' and ''Non Paradisi'' respectively, have been released
        under the predominately metal record label Blood Music. His third album, ''Possessor'',
        is also set to release under Blood Music. While GosT''s early works focused
        more on the horror aspect of his music, his more recent works have evolved
        into a style and sound truly unique to this dark master of synthwave.\n <a
        href=\"https://www.last.fm/music/Gost\">Read more on Last.fm</a>. User-contributed
        text is available under the Creative Commons By-SA License; additional terms
        may apply."}}}'
