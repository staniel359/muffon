        Sep 2009, 09:48","summary":"Power Glove are an Australian electronic music
        and synthwave duo from Melbourne, Victoria, named after the Nintendo Power
        Glove. They provided the soundtrack to the 1980s-influenced retro-futuristic
        video game, Far Cry 3: Blood Dragon (April 2013). The soundtrack met with
        critical acclaim.\n\nPower Glove were formed in Melbourne as the electronic
        music, synthwave duo (under pseudonyms) of Michael Biehn and Michael Dudikoff.
        In reality, the duo consists of brothers Jarome and Joel Harmsworth. <a href=\"https://www.last.fm/music/Power+Glove\">Read
        more on Last.fm</a>","content":"Power Glove are an Australian electronic music
        and synthwave duo from Melbourne, Victoria, named after the Nintendo Power
        Glove. They provided the soundtrack to the 1980s-influenced retro-futuristic
        video game, Far Cry 3: Blood Dragon (April 2013). The soundtrack met with
        critical acclaim.\n\nPower Glove were formed in Melbourne as the electronic
        music, synthwave duo (under pseudonyms) of Michael Biehn and Michael Dudikoff.
        In reality, the duo consists of brothers Jarome and Joel Harmsworth.\n\nThe
        duo''s music gained widespread attention with the track \"Hunters\" featured
        in the 2011 Canadian independent film, Hobo with a Shotgun and the track \"Vengeance\"
        was used in the 2012 film, The ABCs of Death. Their first extended play, the
        four-track EP 1 (a.k.a. So Bad), was released in January, 2012. Tracks by
        the group have appeared in various artists'' compilation albums.\n\nThe duo
        provided the soundtrack to Far Cry 3: Blood Dragon (April 2013), which is
        a 1980s-influenced retro-futuristic video game. Michael Langley of CraveOnline
        website described that Dean Evans of Ubisoft contacted the group and asked
        if they would create the soundtrack to the game.\n\nSince releasing their
        second EP, EPII in 2015 the duo has scored the Blood Dragon themed iteration
        of the Trials video game series, Trials of the Blood Dragon which was released
        in June, 2016 by Ubisoft. <a href=\"https://www.last.fm/music/Power+Glove\">Read
        more on Last.fm</a>. User-contributed text is available under the Creative
        Commons By-SA License; additional terms may apply."}}}'
