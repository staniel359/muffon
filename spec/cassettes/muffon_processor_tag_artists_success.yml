        Apr 2014, 15:39","summary":"\nCarpenter Brut is a French electronic music
        artist whose real name is Franck Hueso. Little personal information is known
        about him aside from his French nationality. His anonymity is a deliberate
        artistic choice in order to place more importance on the music itself rather
        than the identity of the musician behind it.\n\nHe first released the initial
        three EPs, which were collected together and released together under the title
        \"Trilogy\" in 2015. In 2018 he released Leather Teeth, the first part of
        a promised new trilogy. <a href=\"https://www.last.fm/music/Carpenter+Brut\">Read
        more on Last.fm</a>","content":"\nCarpenter Brut is a French electronic music
        artist whose real name is Franck Hueso. Little personal information is known
        about him aside from his French nationality. His anonymity is a deliberate
        artistic choice in order to place more importance on the music itself rather
        than the identity of the musician behind it.\n\nHe first released the initial
        three EPs, which were collected together and released together under the title
        \"Trilogy\" in 2015. In 2018 he released Leather Teeth, the first part of
        a promised new trilogy. He has also contributed original music to a variety
        of soundtracks. He started writing music as Carpenter Brut with the intention
        of mixing sounds from horror films, metal, rock, and electronic music. He
        has toured the United States and Europe, and in 2016 he toured the US with
        the Swedish heavy metal band Ghost. He performs live with a guitarist and
        drummer. <a href=\"https://www.last.fm/music/Carpenter+Brut\">Read more on
        Last.fm</a>. User-contributed text is available under the Creative Commons
        By-SA License; additional terms may apply."}}}'
