        <a href=\"https://www.last.fm/music/Lost+Years\">Read more on Last.fm</a>","content":"\n(lost
        years is the name of 2 musical groups)\n\n1) Lost Years is an Indie/Punk/Rock
        that was founded in a garage by three friends in 2010. Since then the group
        has released one Acoustic LP through Capeside Records which led to Lost Years
        winning the Ernie Ball Battle of The Bands Acoustic Basement and being featured
        on the Indianapolis date of the 2013 Vans Warped Tour.  In addition, Lost
        Years hasself released two full length records including the new album Traditions
        released on January 7th, 2014. The group released a music video in support
        of their new single  ''Costanza Can''t Stand Ya''(http://youtu.be/GF_ZciB9Ask)
        on November 18th, 2013.The band is currently set to release a new music video,
        announce an East Coast tour and release info about a possible 4th album in
        the Summer of 2014.\n\nwww.lostyears.net\n\n\n2) Lost Years is Magnus Larson
        from Avesta, Sweden. His enthusiasm for the 1980s, red wine and collecting
        Roland synthesizers has landed him a permanent spot on the Rosso Corsa Records
        roster. His music ranges from charming surprises to soundtracks for bad-ass
        newscasts. Both of these different sounds remain cohesive within the Lost
        Years aesthetic through the use of real 1980 synthesizers. Magnus has been
        professionally making 1980s-inspired music since 2008. Before he started collecting
        Roland synthesizers, Magnus spent his time playing guitar in the 80s punk
        and 90s hardcore scenes.\n\nhttp://soundcloud.com/lostyears <a href=\"https://www.last.fm/music/Lost+Years\">Read
        more on Last.fm</a>. User-contributed text is available under the Creative
        Commons By-SA License; additional terms may apply."}}}'
