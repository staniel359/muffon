        Apr 2018, 18:29","summary":"Just for a Day is the debut studio album by the
        English band Slowdive, released on 2 September 1991 by record label Creation.
        Just for a Day was recorded at Courtyard Studios in Abingdon in the Thames
        Valley, formerly known as Georgetown Studios. The album peaked at No. 3 in
        the UK Indie Chart. Upon its release, copies of the album were labelled with
        a sticker that read \"like a mind altering substance, without the risk\".
        Just for a Day has been generally well received by critics. <a href=\"http://www.last.fm/music/Slowdive/Just+for+a+Day\">Read
        more on Last.fm</a>.","content":"Just for a Day is the debut studio album
        by the English band Slowdive, released on 2 September 1991 by record label
        Creation. Just for a Day was recorded at Courtyard Studios in Abingdon in
        the Thames Valley, formerly known as Georgetown Studios. The album peaked
        at No. 3 in the UK Indie Chart. Upon its release, copies of the album were
        labelled with a sticker that read \"like a mind altering substance, without
        the risk\". Just for a Day has been generally well received by critics. Trouser
        Press wrote that it was \"up and down in material, but the songs that are
        solid are breathtaking, and those that aren''t are at least hypnotic and slowly
        sensuous.\" Jon Ridge, reviewing the album for Lime Lizard magazine, thought
        the album was premature, describing it as \"more a continuation, or aqueous
        celebration rather, than an advancement over their rather spiffing previous
        three EPs\". Pitchfork''s review of the album, while generally favourable,
        wrote: \"There''s a lot less weight to it, and if anything in Slowdive''s
        catalogue will seem dated, it''s the overgroomed production on these songs\".\n\nIn
        1999, critic Ned Raggett ranked the album at number 17 on his list of \"The
        Top 136 or So Albums of the Nineties\". <a href=\"http://www.last.fm/music/Slowdive/Just+for+a+Day\">Read
        more on Last.fm</a>. User-contributed text is available under the Creative
        Commons By-SA License; additional terms may apply."}}}'
