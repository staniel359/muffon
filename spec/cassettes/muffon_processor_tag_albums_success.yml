        Apr 2010, 10:18","summary":"Souvlaki is an album by the British dream pop/shoegazing
        band Slowdive. It was released on May 17, 1993 in the UK and on February 8,
        1994 in the U.S. Widely regarded as their best album, it benefits from synthesizer
        contributions from co-producer Brian Eno on \"Sing\" (which he co-wrote) and
        \"Here She Comes.\" The album''s U.S. release includes the previously unreleased
        cover of \"Some Velvet Morning\" (written by Lee Hazlewood and Nancy Sinatra
        in 1967) and three tracks from the band''s 1993 5 EP, comprising the four
        U.S. release bonus tracks. <a href=\"http://www.last.fm/music/Slowdive/Souvlaki\">Read
        more on Last.fm</a>.","content":"Souvlaki is an album by the British dream
        pop/shoegazing band Slowdive. It was released on May 17, 1993 in the UK and
        on February 8, 1994 in the U.S. Widely regarded as their best album, it benefits
        from synthesizer contributions from co-producer Brian Eno on \"Sing\" (which
        he co-wrote) and \"Here She Comes.\" The album''s U.S. release includes the
        previously unreleased cover of \"Some Velvet Morning\" (written by Lee Hazlewood
        and Nancy Sinatra in 1967) and three tracks from the band''s 1993 5 EP, comprising
        the four U.S. release bonus tracks.\n\nAccording to interviews with the band,
        the album was titled after an explicit skit on the first album by telephone
        pranksters The Jerky Boys, containing the line: \"My wife loves that Greek
        shit. She''ll suck your cock like souvlaki.\" <a href=\"http://www.last.fm/music/Slowdive/Souvlaki\">Read
