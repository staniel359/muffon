        <a href=\"https://www.last.fm/music/Gardens+&+Villa\">Read more on Last.fm</a>","content":"Gardens
        & Villa are an indie rock band from Santa Barbara, CA. They formed following
        the collapse of a noisier post-punk band and a hitch-hiking journey up the
        west coast. Members Chris Lynch, Adam Rasmussen, Levi Hayden, Shane McKillop
        began playing in earnest as Gardens & Villa in 2008. The name is pulled from
        the location of their house on Villa Street, and the property''s lovely garden
        to which they tend. The music they make is very much connected to coastal
        city they call home -- the stoney bike rides, dance parties, a scene free
        of judgment. The band refers to this Santa Barbara feeling as \"coco vibes.\"
        For two weeks in the summer of 2010, the band camped behind visionary and
        now-labelmate Richard Swift''s Oregon studio. No shower, no kitchen, but all
        the magic you could ask for. After taking a band oath to always play all parts
        live -- a la Talking Heads'' Stop Making Sense -- the band added member Dusty
        Ineman to supremely execute the live incarnation of the band. [c/o Secretly
        Canadian]\n\nThey are signed to Secretly Canadian records.\n\nMusicians:\nChris
        Lynch: Guitar, Vocals, Flute\nLevi Hayden: Drums\nAdam Rasmussen: Piano, Synth,
        Vocals\nShane McKillop: Bass, Vocals\nDustin Ineman: Percussion, Synth, Keyboard  <a
        href=\"https://www.last.fm/music/Gardens+&+Villa\">Read more on Last.fm</a>.
        User-contributed text is available under the Creative Commons By-SA License;
        additional terms may apply."}}}'
