        Jun 2010, 08:29","summary":"Teen Daze is a Canadian electronic musician from
        Abbotsford, British Columbia.\n\nTeen Daze is a stage name for solo musician
        Jamison Isaak. His first albums were released in 2010, attracting the attention
        of online music press outlets such as Pitchfork Media. Signing with Lefse
        Records, he released the full-length All of Us Together in 2012, followed
        quickly by Glacier in 2013. On his 2015 John Vanderslice-produced album Morning
        World, Teen Daze shifted from an electronic-driven style with elements of
        chillwave <a href=\"https://www.last.fm/music/Teen+Daze\">Read more on Last.fm</a>","content":"Teen
        Daze is a Canadian electronic musician from Abbotsford, British Columbia.\n\nTeen
        Daze is a stage name for solo musician Jamison Isaak. His first albums were
        released in 2010, attracting the attention of online music press outlets such
        as Pitchfork Media. Signing with Lefse Records, he released the full-length
        All of Us Together in 2012, followed quickly by Glacier in 2013. On his 2015
        John Vanderslice-produced album Morning World, Teen Daze shifted from an electronic-driven
        style with elements of chillwave, house, and ambient to more of an indie pop
        sound, adding his own vocals.\n\nAfter last year''s foray into vibrant indie-pop,
        Themes finds Teen Daze returning to more ambient, electronic production with
        new insight: \"I learned so much from the experience making Morning World,
        it would be a step backwards if I didn''t apply it.\" This comes through in
        songs like \"Lost\", \"Rising\" and the first single, \"Cycle\", which fuse
        the synthesized sound of early Teen Daze records with the live energy of his
        more recent works. Themes is also distinct in its collaborative nature. Jamison
        has worked with other artists in the past, but never to this degree and expanse:
        \"Making the last record alongside other people helped me realize that inviting
        additional minds to the creative process brings out the best in me.\"\n\nConceptually
        and thematically, this album is one of Jamison''s most personal, navigating
        topics both intimate and broad: \"Much of my work is inspired by nature, and
        it''s scary to think that future generations may not have that same relationship.
        The album starts with Cycle, a song about my personal experience dealing with
        anxiety and depression, and it slowly zooms out to cover some of the external
        forces, like climate change, that are affecting those experiences. After touring
        last fall, I came home so cynical and worn out, I decided take all the nervous
        energy I had about the world, and filter it through more optimistic, positive
        sounds.\". <a href=\"https://www.last.fm/music/Teen+Daze\">Read more on Last.fm</a>.
        User-contributed text is available under the Creative Commons By-SA License;
        additional terms may apply."}}}'
