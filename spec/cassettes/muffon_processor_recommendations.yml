        Dec 2008, 01:06","summary":"\nThere is more than one group named The Drums:\n1)
        an American indie pop band from Brooklyn, NY\n2) an  American experimental
        band from San Francisco \n\n1)  The Drums are an American indie pop band from
        Brooklyn, NY. Jonny Pierce and Jacob Graham met at summer camp when they were
        children and have been best friends ever since. Soon after their initial meeting,
        they formed Goat Explosion and toured extensively in North America during
        their teenage years. <a href=\"https://www.last.fm/music/The+Drums\">Read
        more on Last.fm</a>","content":"\nThere is more than one group named The Drums:\n1)
        an American indie pop band from Brooklyn, NY\n2) an  American experimental
        band from San Francisco \n\n1)  The Drums are an American indie pop band from
        Brooklyn, NY. Jonny Pierce and Jacob Graham met at summer camp when they were
        children and have been best friends ever since. Soon after their initial meeting,
        they formed Goat Explosion and toured extensively in North America during
        their teenage years. Around 2003, Pierce and Adam Kessler formed Elkland.
        In the meantime, Graham formed a band called Horse Shoes (Shelflife Records).
        Pierce ultimately decided to take a few years off from writing music after
        becoming disillusioned with the music business and parted ways with Elkland
        in 2005.\n\nThe Drums were formed in late 2006.  Relocating to New York, The
        Drums added former Elkland guitarist Adam Kessler on second guitar and NYC
        born drummer Connor Hanwick (formerly of lo-fi teen pop duo Cape of No Hope)
        to the line up and set up a month long residency at a small club on the lower
        east side of Manhattan. They released their debut single Let''s Go Surfing
        on on 15 September 2009, which the Let''s Go Surfing Songfacts reports was
        inspired by Barack Obama''s victory in the 2008 presidential election.\n\nAs
        of September 2010, guitarist Adam Kessler has left the band.\nhttp://wearethedrums.com\n\n2)  The
        Drums is an  American experimental band from San Francisco featuring John
        Dwyer (of Coachwhips, Pink & Brown, Thee Oh Sees) on drums and Anthony Petrovic
        (Ezee Tiger, Gay Barbarians) on drums.\n\n\n\n <a href=\"https://www.last.fm/music/The+Drums\">Read
        more on Last.fm</a>. User-contributed text is available under the Creative
        Commons By-SA License; additional terms may apply."}}}'
