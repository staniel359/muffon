        Aug 2006, 15:50","summary":"\nBeach House is a dream pop group that formed
        in 2005 in Baltimore, Maryland, United States. The group consists of Victoria
        Legrand (vocals, organ) and Alex Scally (guitar, keyboards). Legrand is the
        niece of French composer Michel Legrand. The group has released seven albums:
        Beach House (2006), Devotion (2008), Teen Dream (2010), Bloom (2012), Depression
        Cherry (2015), Thank Your Lucky Stars (2015) and 7 (2018)\n\nWithin a year
        of formation, the group charmed indie music enthusiasts across the blogosphere
        with their languid songcraft <a href=\"https://www.last.fm/music/Beach+House\">Read
        more on Last.fm</a>","content":"\nBeach House is a dream pop group that formed
        in 2005 in Baltimore, Maryland, United States. The group consists of Victoria
        Legrand (vocals, organ) and Alex Scally (guitar, keyboards). Legrand is the
        niece of French composer Michel Legrand. The group has released seven albums:
        Beach House (2006), Devotion (2008), Teen Dream (2010), Bloom (2012), Depression
        Cherry (2015), Thank Your Lucky Stars (2015) and 7 (2018)\n\nWithin a year
        of formation, the group charmed indie music enthusiasts across the blogosphere
        with their languid songcraft, while the eerie warmth of \"Apple Orchard\"
        landed on Pitchfork''s Infinite Mixtape MP3 series in August 2006. Two months
        later, Beach House issued their eponymous debut album for Carpark. Fall shows
        with labelmates Over the Atlantic were also scheduled.\n\nVictoria can also
        be heard on Frenemies'' Birds in High School album.  She and Chris Freeland
        created harmonies on the song \"Waiting for the Ambulance\". Victoria can
        also be heard on Grizzly Bear''s 2009 release Veckatimest and she sings on
        \"Slow Life\", a Grizzly Bear track featured on the official soundtrack for
        Twilight: New Moon.\n\nIn September of 2009 Sub Pop Records announced that
        Beach House had signed and that a follow up album to 2008''s Devotion, Teen
        Dream would be released in early 2010.\n\n\n <a href=\"https://www.last.fm/music/Beach+House\">Read
        more on Last.fm</a>. User-contributed text is available under the Creative
        Commons By-SA License; additional terms may apply."}}}'
