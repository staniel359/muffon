        members have included Peggy Wang (vocals, keyboards), Alex Naidus (bass),
        and Kurt Feldman (drums, programming). <a href=\"https://www.last.fm/music/The+Pains+of+Being+Pure+at+Heart\">Read
        more on Last.fm</a>","content":"The Pains of Being Pure at Heart is an indie
        pop band which formed in 2007 in New York City, New York, USA. The band consists
        of Kip Berman (vocals, guitar), who currently performs live with Christoph
        (guitar) and Anton (drums) Hochheim (formerly of The Depreciation Guild, currently
        of Ablebody), Jacob Sloan (bass) (Dream Diary), Jessica Weiss (vocals) (Fear
        of Men), and Jen Goma (vocals) (A Sunny Day in Glasgow/Roman a Clef).\n\nPast
        members have included Peggy Wang (vocals, keyboards), Alex Naidus (bass),
        and Kurt Feldman (drums, programming). Feldman currently works as an engineer
        and producer at Winter Station Studios and leads the synthpop group Ice Choir
        and the sophisti-pop group Roman a Clef, which also features current Pains
        member Jen Goma. <a href=\"https://www.last.fm/music/The+Pains+of+Being+Pure+at+Heart\">Read
