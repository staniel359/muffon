        Sep 2008, 03:46","summary":"Toro y Moi is a solo project of Columbia, South
        Carolina native and resident, Chaz Bear (f.k.a. Chaz Bundick). In 2009, Bear
        earned a BFA in Graphic Design from The University of South Carolina.  \n\nChaz
        Bear''s methods are constantly evolving. While heavily influenced by his parent''s
        vinyl and tape collection, his contemporary influences are Animal Collective,
        Sonic Youth, J Dilla, and Daft Punk.  \n\nToro y Moi started in 2007 as a
        bedroom project that quickly grew into live performance. <a href=\"https://www.last.fm/music/Toro+y+Moi\">Read
        more on Last.fm</a>","content":"Toro y Moi is a solo project of Columbia,
        South Carolina native and resident, Chaz Bear (f.k.a. Chaz Bundick). In 2009,
        Bear earned a BFA in Graphic Design from The University of South Carolina.  \n\nChaz
        Bear''s methods are constantly evolving. While heavily influenced by his parent''s
        vinyl and tape collection, his contemporary influences are Animal Collective,
        Sonic Youth, J Dilla, and Daft Punk.  \n\nToro y Moi started in 2007 as a
        bedroom project that quickly grew into live performance. The music is associated
        with the chillwave movement but the sound is influenced by freak folk, R&B,
        and French House.\n\nToro y Moi is signed to Carpark Records. The first full-length
        album, Causers of This, was released in January 2010.\n\nToro y Moi''s second
        album Underneath the Pine was released in February 2011.\n\nHis EP titled
        Freaking Out was released in September of 2011.\n\nA compilation of songs
        titled June 2009 was released in April of 2012.\n\nHis album \"Anything In
        Return\" was released on January 16, 2013.\n\nHis fourth album \"What For?\"
        was released on April 6 2015.\n\nHis latest, fifth album \"Boo Boo\" was released
        on July 7, 2017. <a href=\"https://www.last.fm/music/Toro+y+Moi\">Read more
        on Last.fm</a>. User-contributed text is available under the Creative Commons
        By-SA License; additional terms may apply."}}}'
