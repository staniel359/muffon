        more on Last.fm</a>","content":"Wild Nothing is the solo project of Virginia-born
        Jack Tatum. Tatum began recording under the moniker Wild Nothing in the summer
        of 2009 in Blacksburg, Virginia. Upon gathering attention in indie music circles,
        he was signed with the Captured Tracks record label and began touring with
        a band. His debut full-length, \"Gemini,\" was released in spring 2010 to
        acclaim from Pitchfork Media and the music editors at Amazon.com. A follow-up
        album called \"Nocturne\" was released in 2012. His second EP \"Empty Estate\"
        was released in May 2013. Tatum''s third LP entitled \"Life of Pause\" was
        released on February 19, 2016.\n\n <a href=\"https://www.last.fm/music/Wild+Nothing\">Read
