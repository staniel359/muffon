# SQLite version 3.x
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
default: &default
  adapter: postgresql
  encoding: utf8
  pool: 75
  timeout: 5000
  database: muffon
  user: muffon

development:
  <<: *default

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
# test:
#   adapter: postgresql
#   pool: 25
#   timeout: 5000
#   user: muffon_test
#   database: muffon_test

production:
  <<: *default